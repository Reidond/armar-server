name: CD

on:
  push:
    branches: [main]   # → preview (rolling prerelease on GH Releases)
    tags: ['v*']       # → release (PyPI + GitHub Release)
  workflow_dispatch:

# Mutual exclusion: a single push updates exactly one ref kind, and the
# preview job re-checks that HEAD does not carry a v* tag.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # PyPI Trusted Publishing

env:
  UV_VERSION: "0.11.25"

jobs:
  preview:
    name: Preview release (rolling prerelease)
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: "Guard: skip if HEAD is a tagged release"
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "::error::HEAD is a v* tag; the release job handles this ref."
            exit 1
          fi

      - name: Build wheels for armar-core + armar-cli
        run: uv build --package armar-core --package armar-cli

      - name: Compute version
        id: ver
        run: |
          uv run python -c "from importlib.metadata import version; print(version('armar-core'))" > .version
          echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Update rolling `preview` GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: "preview — ${{ steps.ver.outputs.version }}"
          prerelease: true
          generate_release_notes: true
          files: dist/*.whl dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release (PyPI + GitHub Release)
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build wheels for all published packages
        run: |
          uv build --package armar-core --package armar-cli --package armar-agentd

      - name: Compute version + checksums
        id: meta
        run: |
          uv run python -c "from importlib.metadata import version; print(version('armar-core'))" > .version
          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS
          echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"

      # Publishes every built distribution in dist/ (armar-core, armar-cli,
      # armar-agentd) in lockstep. skip-existing makes a partial re-run safe.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

      - name: Create GitHub Release with notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — ${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
