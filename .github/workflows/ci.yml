name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: jobs only read the repo.
permissions:
  contents: read

# One run per ref; cancel superseded runs to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.25"

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv run --locked ruff check --output-format=github .

  format:
    name: Ruff format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv run --locked ruff format --check --diff .

  typecheck:
    name: basedpyright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv run --locked basedpyright

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          python-version: ${{ matrix.python-version }}
      - run: uv run --locked --python ${{ matrix.python-version }} pytest -q

  lock:
    name: uv.lock up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv lock --check

  build:
    name: Build wheels
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv build --all-packages
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  wheel-smoke:
    name: Wheel smoke (armar-core + armar-cli)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python --find-links dist armar-core armar-cli
          /tmp/smoke/bin/armar --help
          /tmp/smoke/bin/armar --version

  dockerfile-lint:
    name: Hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: warning

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck docker/entrypoint.sh install/install.sh scripts/gen-flatpak-deps.sh scripts/build-flatpak.sh scripts/qmllint.sh

  qmllint:
    name: qmllint (QML)
    # ubuntu-latest (24.04 Noble) ships KF5 Kirigami only; KF6 is on Fedora.
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install system Kirigami QML module
        # Provides org.kde.kirigami (and pulls Qt6 runtime libs that
        # PySide6's bundled qmllint also needs). scripts/qmllint.sh
        # discovers it under /usr/lib64/qt6/qml on Fedora.
        run: dnf install -y --setopt=install_weak_deps=False kf6-kirigami
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      - run: uv sync --locked
      - run: ./scripts/qmllint.sh

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: false
          load: false
          tags: armar-reforger:ci
          build-args: |
            UID=1000
            GID=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflow files
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  ci-ok:
    name: CI passed
    needs:
      - lint
      - format
      - typecheck
      - test
      - lock
      - build
      - wheel-smoke
      - dockerfile-lint
      - shellcheck
      - qmllint
      - docker-build
      - actionlint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "Job results: $results"
          case ",$results," in
            *,failure,* | *,cancelled,* | *,skipped,*)
              echo "::error::A required job did not succeed"
              exit 1
              ;;
          esac
          echo "All required jobs succeeded."
