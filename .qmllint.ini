# qmllint settings for armar-manager's QML.
#
# Auto-discovered by both the CLI lint (scripts/qmllint.sh + CI) and the
# editor (pyside6-qmlls reads the nearest .qmllint.ini), so the IDE and
# the gate report identical diagnostics.
#
# Note: the Python-injected context properties
# (connectionManager, machineStore) cannot be resolved statically. They
# are silenced per-site with inline `// qmllint disable unqualified`
# directives — NOT by relaxing the UnqualifiedAccess category here — so
# a genuinely new unqualified-access bug still fails the lint.
#
# Our own QML uses `qsTr()` (Qt Linguist path) instead of KDE's
# `i18n()`/`i18nc()`, so no KLocalizedContext binding is required.
# The I18nShim (armar_manager.i18n) is installed as the QML context
# object in app.py for third-party C++ components (e.g.
# kirigami-addons FormCard) that still call `i18n()` from QML.

[General]
# Any warning-level diagnostic fails the run (matches scripts/qmllint.sh).
MaxWarnings=0
