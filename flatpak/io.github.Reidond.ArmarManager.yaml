# NOTE — Flathub submission policy (2026)
# ===========================================
# Flathub rejects new applications whose packaging (manifest, build
# scripts, patches, MetaInfo, .desktop, the submission PR itself) is
# AI-generated. A human maintainer must author and own every line of
# this directory before opening a `flathub/flathub` PR. Treat this
# directory as a learning reference / starting point, not a submittable
# artifact. **Never auto-open a flathub PR from this repository.**
#
# Placeholders to update before submission:
#   - the `sources.url` and `commit:` in the armar-manager module
#     (pin to a real release tag + commit SHA)
#   - the screenshot URL in the MetaInfo
#   - the `<developer id>` and `<name>` in the MetaInfo
# Local/private Flatpak builds are unaffected by the above.
id: io.github.Reidond.ArmarManager
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.10'
command: armar-manager
# Trim the BaseApp per its own README: drop WebEngine (we don't use it)
# and NumPy (not a direct dep).
build-options:
  prepend-path:
    - /app/bin
  env:
    BASEAPP_REMOVE_WEBENGINE: '1'
    BASEAPP_DISABLE_NUMPY: '1'

# See https://github.com/flathub/io.qt.PySide.BaseApp/wiki/README
cleanup-commands:
  - /app/cleanup-BaseApp.sh

# All sensitive data lives under XDG_DATA_HOME (auto-mapped to
# ~/.var/app/<id>/ inside the Flatpak sandbox), so the manifest needs
# no --filesystem home/host holes.
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=ssh-auth
  - --talk-name=org.freedesktop.secrets

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/man
  - /share/doc
  - /share/gtk-doc
  - /share/aclocal
  - /share/bash-completion
  - /share/icons/AdwaitaLegacy
  - /share/icons/AdwaitaLegacyLegacy
  - '*.a'
  - '*.la'
  - '*.so'
  - '*.so.*'
  - '*.pyc'
  - '*.pyo'
  - '__pycache__'

modules:
  # 1) Pinned third-party Python dependencies, generated by
  #    scripts/gen-flatpak-deps.sh. Prebuilt manylinux wheels are
  #    used for everything that has them (incl. cryptography), so no
  #    sdk-extensions for Rust are required. One module per arch;
  #    flatpak-builder picks the one matching the current build target.
  - python3-deps.x86_64.json
  - python3-deps.aarch64.json

  # 2) The app itself, built from a pinned git source. The human
  #    maintainer must update the `commit:` and bump `release` on
  #    each Flathub update; the x-checker-data block lets
  #    flatpak-external-data-checker open update PRs automatically.
  - name: armar-manager
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --no-index --no-build-isolation --prefix=/app ./packages/armar-core ./packages/armar-manager
      - install -Dm644 flatpak/io.github.Reidond.ArmarManager.desktop
                   /app/share/applications/io.github.Reidond.ArmarManager.desktop
      - install -Dm644 flatpak/io.github.Reidond.ArmarManager.metainfo.xml
                   /app/share/metainfo/io.github.Reidond.ArmarManager.metainfo.xml
      - install -Dm644 flatpak/io.github.Reidond.ArmarManager.svg
                   /app/share/icons/hicolor/scalable/apps/io.github.Reidond.ArmarManager.svg
    sources:
      - type: git
        url: https://github.com/Reidond/armar-server.git
        # Pinned to the v0.1.0 commit. Maintainer: bump on each release.
        commit: aaa483c4a5583cc27134f04248ff93bac78315e8
        tag: v0.1.0
        x-checker-data:
          type: git
          tag-pattern: '^v([\d.]+)$'
